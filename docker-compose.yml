version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: genlogs_db
    environment:
      # Staff Tip: Use default values to maintain Zero-Config while allowing overrides
      POSTGRES_DB: ${DB_NAME:-genlogs}
      POSTGRES_USER: ${DB_USER:-genlogs_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-genlogs_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: genlogs_backend
    environment:
      # Derived from the variables above to ensure consistency
      DATABASE_URL: postgresql://${DB_USER:-genlogs_user}:${DB_PASSWORD:-genlogs_pass}@db:5432/${DB_NAME:-genlogs}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: genlogs_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
