version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: genlogs_db
    environment:
      POSTGRES_DB: genlogs
      POSTGRES_USER: genlogs_user
      POSTGRES_PASSWORD: genlogs_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: genlogs_backend
    environment:
      DATABASE_URL: postgresql://genlogs_user:genlogs_pass@db:5432/genlogs
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: genlogs_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
